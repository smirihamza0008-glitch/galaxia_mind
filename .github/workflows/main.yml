name: Build Android APK
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Java JDK
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: actions/subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Force Clean and Create Android Base
        run: |
          rm -rf pubspec.yaml
          flutter create --org com.smiri.galaxia --project-name galaxia_mind .
          
      - name: Overwrite Main Code
        run: |
          rm -rf lib/main.dart
          curl -o lib/main.dart https://raw.githubusercontent.com/${{ github.repository }}/main/lib/main.dart

      - name: Get Dependencies and Build
        run: |
          flutter pub get
          flutter build apk --debug

      - name: Upload APK Package
        uses: actions/upload-artifact@v3
        with:
          name: Galaxia-Mind-Game
          path: build/app/outputs/flutter-apk/app-debug.apk
