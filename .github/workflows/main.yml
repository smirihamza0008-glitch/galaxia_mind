name: Build Galaxia Mind APK
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Java JDK
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: actions/subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Fresh Flutter Project Creation
        run: |
          rm -rf pubspec.yaml lib
          flutter create --org com.smiri.galaxia --project-name galaxia_mind .

      - name: Download Ultimate Game Code
        run: |
          curl -o lib/main.dart https://raw.githubusercontent.com/${{ github.repository }}/main/lib/main.dart

      - name: Build Debug APK
        run: |
          flutter pub get
          flutter build apk --debug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v3
        with:
          name: GalaxiaMindGame
          path: build/app/outputs/flutter-apk/app-debug.apk
